name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npx expo export --platform web
        env:
          NODE_ENV: production

      - name: Add error handler and 404 fallback
        run: |
          # Add visible error handler and dark background so errors are visible
          sed -i 's|</head>|<style>body{background:#1a1a2e;color:white;font-family:sans-serif;}</style><script>window.onerror=function(m,s,l,c,e){document.getElementById("root").innerHTML="<div style=\\"padding:20px\\"><h2>Error</h2><pre>"+m+"\\n"+s+":"+l+"</pre></div>";}</script></head>|' dist/index.html
          cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
